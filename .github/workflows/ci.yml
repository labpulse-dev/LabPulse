name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  docker-build:
    name: Docker Compose build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Build all services
        run: docker compose build

